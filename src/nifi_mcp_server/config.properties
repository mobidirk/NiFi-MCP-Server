# =========================
# App Runtime
# =========================
app.environment=local

# =========================
# MCP Server Transport
# =========================
mcp.transport=sse
mcp.host=127.0.0.1
mcp.port=3030

# =========================
# MCP Incoming Auth (user -> MCP)
# =========================
mcp.auth.mode=basic_static
mcp.auth.fail_open=false

# Optional group-based authorization
mcp.authz.group_check.enabled=false
mcp.authz.required_group=

# --- basic_static ---
mcp.auth.basic.username=admin
mcp.auth.basic.password=change_me

# --- none (local only) ---
mcp.auth.none.allow_in_local_only=true

# --- ldap ---
mcp.auth.ldap.url=
mcp.auth.ldap.bind_dn=
mcp.auth.ldap.bind_password=
mcp.auth.ldap.user_base_dn=
mcp.auth.ldap.user_filter=(uid={username})
mcp.auth.ldap.group_base_dn=
mcp.auth.ldap.group_filter=(member={user_dn})
mcp.auth.ldap.timeout_seconds=5
mcp.auth.ldap.tls.verify=true
mcp.auth.ldap.tls.ca_file=

# --- nifi_integrated ---
mcp.auth.nifi.base_url=https://127.0.0.1:8443/nifi/
mcp.auth.nifi.timeout_seconds=8
mcp.auth.nifi.tls.verify=true
mcp.auth.nifi.tls.ca_file=
mcp.auth.nifi.tls.client_cert_file=
mcp.auth.nifi.tls.client_key_file=
mcp.auth.nifi.token_endpoint=/nifi-api/access/token
mcp.auth.nifi.current_user_endpoint=/nifi-api/access/current-user
mcp.auth.nifi.user_by_id_endpoint_template=/nifi-api/tenants/users/{id}
mcp.auth.nifi.current_user_username_field=identity
mcp.auth.nifi.current_user_id_field=id
mcp.auth.nifi.groups_field=userGroups
mcp.auth.nifi.groups_field_fallback=component.userGroups
mcp.auth.nifi.groups_missing_is_denied=true

# =========================
# MCP -> NiFi Connectivity and Auth
# =========================
# Primary base URL for NiFi API. Alternative: set knox.gateway.url instead.
NIFI_API_BASE=https://127.0.0.1:8443/nifi-api
knox.gateway.url=

# Knox auth options (set one strategy as needed)
KNOX_TOKEN=<your-token>
knox.cookie=
knox.user=
knox.password=
knox.token.endpoint=
knox.passcode.token=

# TLS and HTTP behavior
knox.verify.ssl=true
knox.ca.bundle=
http.timeout.seconds=30
http.max.retries=3
http.rate_limit.rps=5

# Optional mTLS client certs for MCP -> NiFi calls
nifi.tls.cert_file=
nifi.tls.key_file=

# =========================
# NiFi MCP Behavior
# =========================
nifi.readonly=true
nifi.allowed_actions=
nifi.proxy.context.path=
